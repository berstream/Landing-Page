<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKD2 Wangnoi — Systems Board</title>
<meta name="description" content="ศูนย์รวมระบบไอทีภายในของ MKD2 Wangnoi — WFDC · CDC · HDC">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2314181C'/%3E%3Crect x='4' y='4' width='10' height='10' fill='%23FFC72C'/%3E%3Crect x='18' y='18' width='10' height='10' fill='%23FFC72C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #E4E7E9;
    --bg-panel: #FAFAF9;
    --ink: #14181C;
    --ink-soft: #4A5158;
    --yellow: #FFC72C;
    --steel: #2F5773;
    --green: #3C8B5C;
    --line: #C7CCC9;

    --font-display: 'Chakra Petch', sans-serif;
    --font-body: 'IBM Plex Sans Thai', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background:
      repeating-linear-gradient(135deg, rgba(20,24,28,0.035) 0 2px, transparent 2px 26px),
      var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  a{ color: inherit; text-decoration: none; }

  .board{
    max-width: 1100px;
    margin: 0 auto;
    padding: clamp(2.5rem, 6vw, 5rem) clamp(1.25rem, 5vw, 3rem) 3rem;
  }

  /* ---------- HERO ---------- */
  .hero__location{
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--steel);
    margin: 0 0 0.6rem;
  }

  .hero__title{
    font-family: var(--font-display);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    line-height: 0.95;
    font-size: clamp(2.4rem, 8vw, 4.6rem);
    margin: 0 0 1.1rem;
  }

  .hero__title span{ color: var(--steel); }

  .hero__sites{
    display:flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .site-chip{
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    border: 1.5px solid var(--ink);
    padding: 0.3rem 0.6rem;
    background: var(--bg-panel);
  }

  .hero__subtitle{
    max-width: 46ch;
    font-size: 1rem;
    line-height: 1.75;
    color: var(--ink-soft);
    margin: 0 0 1.75rem;
  }

  .hero__meta{
    display:flex;
    align-items:center;
    gap: 0.6rem;
    font-size: 0.85rem;
    color: var(--ink-soft);
    padding-top: 1.25rem;
    border-top: 1.5px dashed var(--line);
  }

  .meta__divider{ color: var(--line); }

  /* ---------- GRID ---------- */
  .board__grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1.5rem;
    margin-top: 2.75rem;
  }

  .card{
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--bg-panel);
    border: 1.5px solid var(--ink);
    padding: 2.5rem 1.5rem 1.5rem;
    opacity: 0;
    transform: translateY(14px);
    animation: rise 0.55s ease forwards;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }

  a.card:hover, a.card:focus-visible{
    transform: translateY(-5px);
    box-shadow: 6px 8px 0 var(--ink);
    border-color: var(--steel);
  }

  a.card:focus-visible{
    outline: 2px solid var(--yellow);
    outline-offset: 3px;
  }

  .card__shutter{
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(135deg, var(--yellow) 0 10px, var(--ink) 10px 20px);
  }

  .card__bay{
    position: absolute;
    top: 8px;
    left: 1.25rem;
    transform: translateY(-50%);
    background: var(--ink);
    color: var(--yellow);
    font-family: var(--font-mono);
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 0.25rem 0.55rem;
  }

  .card__status{
    position: absolute;
    top: 8px;
    right: 1.1rem;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    background: var(--bg-panel);
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    padding: 0.22rem 0.55rem 0.22rem 0.45rem;
  }

  .card__status i{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2.2s infinite;
  }

  .card__title{
    font-family: var(--font-display);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 1.25rem;
    letter-spacing: 0.01em;
    margin: 0 0 0.2rem;
  }

  .card__titleTh{
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--steel);
    margin: 0 0 0.65rem;
  }

  .card__desc{
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--ink-soft);
    margin: 0;
    flex-grow: 1;
  }

  .card__stub{
    position: relative;
    margin-top: 1.4rem;
    padding-top: 0.9rem;
    border-top: 1.5px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card__stub::before, .card__stub::after{
    content: '';
    position: absolute;
    top: -4.5px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--line);
  }
  .card__stub::before{ left: 0; }
  .card__stub::after{ right: 0; }

  .card__site{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
  }

  .card__cta{
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  /* placeholder "next bay" card */
  .card--placeholder{
    border-style: dashed;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--ink-soft);
    background: transparent;
    padding: 2.5rem 1.5rem;
  }

  .card__bay--ghost{
    position: static;
    transform: none;
    background: transparent;
    color: var(--ink-soft);
    border: 1.5px dashed var(--line);
    margin-bottom: 0.9rem;
  }

  .placeholder__text{
    font-family: var(--font-display);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    line-height: 1.5;
    margin: 0;
  }

  /* ---------- FOOTER ---------- */
  .board__footer{
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1.5px solid var(--ink);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: var(--ink-soft);
  }

  .footer__credit{
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
  }

  /* ---------- MOTION ---------- */
  @keyframes rise{
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse{
    0%, 100%{ opacity: 1; }
    50%{ opacity: 0.35; }
  }
  @media (prefers-reduced-motion: reduce){
    .card{ animation: none; opacity: 1; transform: none; }
    .card__status i{ animation: none; }
    html{ scroll-behavior: auto; }
  }
</style>
</head>
<body>

  <div class="board">

    <header class="hero">
      <p class="hero__location">MKD2 · WANGNOI</p>
      <h1 class="hero__title">Systems<br><span>Board</span></h1>
      <div class="hero__sites">
        <span class="site-chip">WFDC</span>
        <span class="site-chip">CDC</span>
        <span class="site-chip">HDC</span>
      </div>
      <p class="hero__subtitle">ศูนย์รวมระบบไอทีภายในที่ใช้งานจริงหน้างาน เลือกระบบที่ต้องการแล้วเข้าใช้งานได้ทันที</p>
      <div class="hero__meta">
        <span id="systemCount">— ระบบ</span>
        <span class="meta__divider">·</span>
        <span id="liveClock"></span>
      </div>
    </header>

    <main class="board__grid" id="grid"></main>

    <footer class="board__footer">
      <p>บอร์ดนี้จะอัปเดตเรื่อย ๆ เมื่อมีระบบใหม่เปิดใช้งาน</p>
      <p class="footer__credit">MKD2 WANGNOI · IT</p>
    </footer>

  </div>

<script>
  // ------------------------------------------------------------------
  // เพิ่มระบบใหม่ได้ที่นี่: คัดลอก object หนึ่งชุดด้านล่าง แล้วแก้ค่า
  // bay / nameEn / nameTh / desc / site / url ตามระบบใหม่ที่เปิดใช้งาน
  // ระบบจะถูกเรียงตามลำดับในลิสต์นี้ และการ์ด "BAY ถัดไป" จะขยับเลขให้เอง
  // ------------------------------------------------------------------
  const SYSTEMS = [
    {
      bay: '01',
      nameEn: 'PDA Borrow–Return',
      nameTh: 'ระบบยืม-คืน PDA',
      desc: 'จัดการยืม-คืนเครื่องสแกนบาร์โค้ด พร้อมสิทธิ์ Admin / คลัง / ผู้ใช้งาน',
      site: 'WFDC',
      url: 'https://script.google.com/macros/s/AKfycbxmApDINP7xxIFoKQkaEp1brHsTMTYS3-o7AfdPCar8Lu8K1NVJHYALPIeYhqD6Xsxjrw/exec',
      status: 'live'
    },
    {
      bay: '02',
      nameEn: 'Ticket System',
      nameTh: 'ระบบแจ้งซ่อม–แจ้งปัญหา IT',
      desc: 'แจ้งปัญหา ติดตามสถานะ และอนุมัติงาน ครอบคลุมหลายไซต์',
      site: 'WFDC · CDC · HDC',
      url: 'https://berstream.github.io/MKD_TicketSystems/Ticket.html',
      status: 'live'
    },
    {
      bay: '03',
      nameEn: 'WFDC Stock',
      nameTh: 'ระบบเบิกจ่ายอุปกรณ์สำนักงาน',
      desc: 'Office Supply Requisition — เบิกอุปกรณ์สำนักงานสำหรับพนักงาน',
      site: 'WFDC',
      url: 'https://berstream.github.io/WarehouseAsset/',
      status: 'live'
    }
  ];

  function renderCards(){
    const grid = document.getElementById('grid');

    SYSTEMS.forEach((sys, i) => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = sys.url;
      card.target = '_blank';
      card.rel = 'noopener';
      card.style.animationDelay = (i * 0.08) + 's';
      card.innerHTML = `
        <span class="card__shutter"></span>
        <span class="card__bay">BAY ${sys.bay}</span>
        <span class="card__status"><i></i>${sys.status === 'live' ? 'LIVE' : sys.status.toUpperCase()}</span>
        <h2 class="card__title">${sys.nameEn}</h2>
        <p class="card__titleTh">${sys.nameTh}</p>
        <p class="card__desc">${sys.desc}</p>
        <div class="card__stub">
          <span class="card__site">${sys.site}</span>
          <span class="card__cta">เข้าใช้งาน →</span>
        </div>
      `;
      grid.appendChild(card);
    });

    const nextBay = String(SYSTEMS.length + 1).padStart(2, '0');
    const placeholder = document.createElement('div');
    placeholder.className = 'card card--placeholder';
    placeholder.style.animationDelay = (SYSTEMS.length * 0.08) + 's';
    placeholder.innerHTML = `
      <span class="card__bay card__bay--ghost">BAY ${nextBay}</span>
      <p class="placeholder__text">ระบบถัดไป<br>กำลังจะมา</p>
    `;
    grid.appendChild(placeholder);

    document.getElementById('systemCount').textContent = SYSTEMS.length + ' ระบบ';
  }

  function tickClock(){
    const el = document.getElementById('liveClock');
    if(!el) return;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    el.textContent = 'อัปเดต ' + hh + ':' + mm + ' น.';
  }

  renderCards();
  tickClock();
  setInterval(tickClock, 30000);
</script>

</body>
</html>
